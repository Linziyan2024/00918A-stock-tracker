name: Hourly Stock Update

on:
  schedule:
    # 台灣 09:00 = UTC 01:00
    # 這裡的 1,2,3,4,5,6 分別代表台灣 9, 10, 11, 12, 13, 14 點
    - cron: '5 1,2,3,4,5,6 * * 1-5'
  workflow_dispatch: # 讓你可以點擊按鈕手動執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Decode credentials
      run: |
        echo "${{ secrets.GSPREAD_JSON }}" | base64 --decode > credentials.json

    - name: Run script
      run: python main.py
