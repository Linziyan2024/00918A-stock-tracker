name: Hourly Stock Update

on:
  schedule:
    # 台灣時間 9:05, 10:05, 11:05, 12:05, 13:05, 14:05 (週一至週五)
    - cron: '5 1,2,3,4,5,6 * * 1-5'
  workflow_dispatch: # 讓你可以點擊按鈕手動執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Decode credentials
      run: |
        echo "${{ secrets.GSPREAD_JSON }}" > credentials.json

    - name: Run script
      run: python main.py
