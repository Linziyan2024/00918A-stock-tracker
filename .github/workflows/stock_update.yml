name: Hourly Stock Update

on:
  schedule:
    # 台灣時間 08:45, 09:15, 09:45, 10:15... 直到 14:15
    # 分鐘 (0,15,30,45) | 小時 (UTC) | 日 | 月 | 週 (1-5 是週一至五)
    - cron: '45 0,1,2,3,4,5,6 * * 1-5' # 台灣時間 08:45, 09:45... 14:45
    - cron: '15 1,2,3,4,5,6 * * 1-5'   # 台灣時間 09:15, 10:15... 14:15
  workflow_dispatch: # 讓你可以點擊按鈕手動執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Decode credentials
      run: |
        echo "${{ secrets.GSPREAD_JSON }}" | base64 --decode > credentials.json

    - name: Run script
      run: python main.py
